<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ site.name }}{% endblock %}</title>
<meta name="description" content="to be labs — independent ai research">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="nav">
  <a class="wordmark" href="/">tobelabs<span class="dot">.</span></a>
  <div class="nav-links">
    <a href="/#research"{% if active == 'research' %} class="on"{% endif %}>research</a>
    <a href="/notes/"{% if active == 'notes' %} class="on"{% endif %}>notes</a>
    <a href="/#about">about</a>
    <a class="contact" href="mailto:{{ site.email }}">contact</a>
  </div>
</nav>

{% block body %}{% endblock %}

<footer class="footer">
  <div class="brand">
    <span class="sq sq-o"></span><span class="sq sq-m"></span><span class="sq sq-g"></span>
    <span class="brandname">to be labs</span>
  </div>
  <a class="mono" href="mailto:{{ site.email }}">{{ site.email }}</a>
</footer>
</body>
</html>
